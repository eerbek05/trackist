services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: trackist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  poller:
    build: .
    command: python3 workers/poller.py
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trackist
    depends_on:
      db:
        condition: service_healthy

  opensky-position:
    build: .
    command: python3 workers/opensky_position.py
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trackist
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trackist
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./flask_session:/app/flask_session
      - ./templates:/app/templates
      - ./static:/app/static

volumes:
  postgres_data:
